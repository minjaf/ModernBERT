# Mirrors `gena-base-pretrain_multi_promoters.yaml` with two changes:
#   1) Online adaptive ("hardest-token") MLM masking is ENABLED.
#   2) `autoresume: true` — resumes from the latest checkpoint in `save_folder`
#      automatically (Composer feature; requires a stable `run_name` and an
#      existing/creatable `save_folder`).
#
# Notes:
#   * Adaptive masking runs a second no-grad forward per microbatch (encoder + MLM head),
#     so per-step FLOPs ~= 2x vanilla. Use `adaptive_masking.recompute_every_n_steps > 1`
#     to amortize. `recompute_every_n_steps=1` matches the user's request literally
#     ("on each step ... run the forward pass with no masking ... then run normal forward").
#   * `compile_model: true` is kept (matches the original config). The scoring forward feeds
#     the full hidden states to the compiled head while the training forward feeds the
#     masked subset, so torch.compile (dynamic=True) will recompile once on each shape.

data_local: ./data/promoters_mds_full/
data_remote: # If blank, files must be present in data_local

max_seq_len: 1024
tokenizer_name: AIRI-Institute/gena-lm-bert-base-t2t
mlm_probability: 0.3
count_padding_tokens: false

# Online adaptive ("hardest-token") MLM masking.
adaptive_masking:
  enabled: true                   # MAIN CHANGE vs. the original config
  selection_mode: topk
  random_fraction: 0.1            # 10% of masked positions chosen uniformly at random (exploration)
  warmup_batches: 0               # use adaptive from step 0
  recompute_every_n_steps: 1      # do the scoring forward on every step (matches the request)
  use_eval_mode_for_scoring: true # disable dropout during the scoring forward
  bert_replacement: true          # apply the 80% [MASK] / 10% random / 10% keep recipe
  apply_at_eval: false            # eval continues to use random masking for consistent comparison
  score: one_minus_p_correct

# Run Name (kept distinct from the baseline run so autoresume picks the right folder).
run_name: moderngena-base-pretrain-promoters_multi_adaptive

# Model
model:
  name: flex_bert
  pretrained_model_name: bert-base-uncased # has to be set to bert-base-uncased legacy reasons
  tokenizer_name: ${tokenizer_name}
  disable_train_metrics: true # save some time by not computing metrics on the training set
  model_config:
    vocab_size: 32768
    init_method: full_megatron
    num_hidden_layers: 22
    hidden_size: 768
    intermediate_size: 1152
    num_attention_heads: 12 # to have head size of 64
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    skip_first_prenorm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu # better safe than sorry
    padding: unpadded
    rotary_emb_dim: null
    rotary_emb_base: 10000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    allow_embedding_resizing: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true
    compile_model: true
    masked_prediction: true

# Dataloaders
train_loader:
  name: text
  dataset:
    data_type: genome
    sample_chunk: true
    min_seq_len: 10
    local: ${data_local}
    remote: ${data_remote}
    split: train
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
    streaming: false
  drop_last: true
  num_workers: 6
  prefetch_factor: 2
  sequence_packing: true
  batch_size_warmup_min_size: ${device_train_microbatch_size}
  batch_size_warmup_tokens: 50_000_000_000tok


eval_loader:
  name: text
  dataset:
    data_type: genome
    sample_chunk: false
    local: ${data_local}
    remote: ${data_remote}
    split: valid
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15 # We always evaluate at 15% masking for consistent comparison
    streaming: false
  drop_last: false
  num_workers: 3
  sequence_packing: false


# Optimization
scheduler:
  name: warmup_stable_decay
  t_warmup: 3_000_000_000tok
  alpha_f: 0.00 # Linearly decay to 0.02x the full LR by the end of the training duration
  t_decay: 0tok

optimizer:
  name: decoupled_stableadamw
  lr: 8e-4 # Peak learning rate
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5 # Amount of weight decay regularization
  filter_bias_norm_wd: true # If True, doesn't apply weight decay to norm layers and biases
  log_grad_norm: true

max_duration: 1_719_000_000_000tok
eval_interval: 2000ba
eval_subset_num_batches: 200
global_train_batch_size: 4608
global_eval_batch_size: 1024

# System
seed: 17
device_eval_batch_size: 64
device_train_microbatch_size: 32
precision: amp_bf16

# Logging
progress_bar: true
log_to_console: true
console_log_interval: 100ba

callbacks:
  speed_monitor:
    window_size: 100
  lr_monitor: {}
  scheduled_gc: {}
  log_grad_norm:
    batch_log_interval: 10
  packing_efficiency:
    log_interval: 10
  dataloader_speed: {}

# W&B logging
# loggers:
#   wandb:
#     project:
#     entity:

loggers:
  tensorboard:
    log_dir: runs/ # will log to log_dir/run_name

# Checkpoint to local filesystem.
save_interval: 100ba
save_num_checkpoints_to_keep: 5  # cleans up older checkpoints on disk
save_folder: runs/{run_name}

# Autoresume: Composer will scan `save_folder` for the latest checkpoint and pick up
# where it left off (training duration, optimizer state, dataset state, etc.).
# `save_overwrite: false` is required so the resumed run does not clobber prior shards.
autoresume: true
save_overwrite: false
