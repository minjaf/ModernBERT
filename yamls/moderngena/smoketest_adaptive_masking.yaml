# Smoke test for online adaptive (hardest-token) MLM masking.
# This config mirrors gena-base-pretrain_multi_promoters.yaml but is tiny:
#   - short seq_len, small batch, very few steps,
#   - no checkpointing, no W&B/tensorboard,
#   - reads from ./data/promoters_mds (smaller variant).

data_local: ./data/promoters_mds/
data_remote:

max_seq_len: 256
tokenizer_name: AIRI-Institute/gena-lm-bert-base-t2t
mlm_probability: 0.3
count_padding_tokens: false

# Online adaptive ("hardest-token") MLM masking -- ENABLED for the smoke test.
adaptive_masking:
  enabled: true
  selection_mode: topk
  random_fraction: 0.1
  warmup_batches: 0
  recompute_every_n_steps: 1
  use_eval_mode_for_scoring: true
  bert_replacement: true
  apply_at_eval: false
  score: one_minus_p_correct

run_name: smoketest-adaptive-masking

model:
  name: flex_bert
  pretrained_model_name: bert-base-uncased
  tokenizer_name: ${tokenizer_name}
  disable_train_metrics: true
  model_config:
    vocab_size: 32768
    init_method: full_megatron
    num_hidden_layers: 4              # tiny encoder for speed
    hidden_size: 128
    intermediate_size: 256
    num_attention_heads: 4
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.1
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: true
    final_norm: true
    skip_first_prenorm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: glu
    mlp_out_bias: false
    normalization: layernorm
    norm_kwargs:
      eps: 1e-5
      bias: false
    hidden_act: gelu
    head_pred_act: gelu
    activation_function: gelu
    padding: unpadded
    rotary_emb_dim: null
    rotary_emb_base: 10000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    allow_embedding_resizing: true
    sliding_window: 128
    global_attn_every_n_layers: 2
    unpad_embeddings: true
    compile_model: false              # disable torch.compile for fast first-step
    masked_prediction: true

train_loader:
  name: text
  dataset:
    data_type: genome
    sample_chunk: true
    min_seq_len: 10
    local: ${data_local}
    remote: ${data_remote}
    split: train
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
    streaming: false
  drop_last: true
  num_workers: 2
  prefetch_factor: 2
  sequence_packing: true

scheduler:
  name: constant_with_warmup
  t_warmup: 0ba

optimizer:
  name: decoupled_stableadamw
  lr: 1e-4
  betas:
    - 0.9
    - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5
  filter_bias_norm_wd: true
  log_grad_norm: false

max_duration: 12ba
eval_interval: 12ba          # never actually triggers (matches end of run)
global_train_batch_size: 4
device_train_microbatch_size: 2

# System
seed: 17
precision: amp_bf16

# Logging
progress_bar: false
log_to_console: true
console_log_interval: 1ba

callbacks:
  speed_monitor:
    window_size: 2
  lr_monitor: {}

# No checkpointing / no remote logging during the smoke test.
